name: Build

on:
  workflow_dispatch:  # manual only — disabled automatic build
  push:
    branches: [disabled-auto-build]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: entropy-linux
            binary: target/release/entropy
          - os: windows-latest
            artifact: entropy-windows
            binary: target/release/entropy.exe
          - os: macos-latest
            artifact: entropy-macos
            binary: dist/macos/*.app.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhidapi-dev \
            libudev-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Build
        if: matrix.os != 'macos-latest'
        run: cargo build --release

      - name: Build macOS app bundle
        if: matrix.os == 'macos-latest'
        run: scripts/build_macos_app.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
